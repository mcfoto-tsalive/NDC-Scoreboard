<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NDC Live Scores - Mobile</title>
  <link rel="stylesheet" href="css/tsa.css" />
  <script src="js/config.js"></script>
</head>
<body class="mobile">
  <div class="page-shell">
    <header class="hero compact">
      <div>
        <div class="kicker">TSA Live</div>
        <h1 id="eventTitle">TSNZ National District Championship</h1>
        <div id="subtitle" class="subtitle">Henshaw Cup - Round 4 Match 8</div>
      </div>
      <div class="live-panel"><div class="live-dot"></div><span id="updatedAt">Loading...</span></div>
    </header>
    <section id="matchSummary" class="match-summary mobile-summary"></section>
    <main id="scoreboard" class="scoreboard mobile-stack"></main>
    <footer>Pull down to refresh or wait for the live update.</footer>
  </div>
  <script src="js/scoreboard.js"></script>
</body>
</html>
