<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NDC Live Scores - TV</title>
  <link rel="stylesheet" href="css/tsa.css" />
  <script src="js/config.js"></script>
</head>
<body class="tv">
  <div class="page-shell">
    <header class="hero">
      <div>
        <div class="kicker">Target Shooting Auckland Live</div>
        <h1 id="eventTitle">TSNZ National District Championship</h1>
        <div id="subtitle" class="subtitle">Henshaw Cup - Round 4 Match 8</div>
      </div>
      <div class="live-panel">
        <div class="live-dot"></div>
        <div><strong>LIVE</strong><br><span id="updatedAt">Loading...</span></div>
      </div>
    </header>

    <section id="matchSummary" class="match-summary"></section>
    <main id="scoreboard" class="scoreboard tv-grid"></main>

    <footer>
      <div>Auto-refreshes every <span id="refreshSeconds">30</span> seconds</div>
      <div id="mobileLink" class="mobile-link"></div>
    </footer>
  </div>
  <script src="js/scoreboard.js"></script>
</body>
</html>
